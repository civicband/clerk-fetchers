name: ✅ New Issue
description: New feature, tooling, or something not covered by the other issue templates

body:

  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to submit an issue!

        **Please provide as much information as you have available. The more information we have, the better.**

        ## Details

  - type: textarea
    id: description
    attributes:
      label: What would you like to see added or changed?
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist for new issues
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/civicband/.github/blob/main/CODE_OF_CONDUCT.md)
          required: true
        - label: I have searched the existing issues and believe this is not a duplicate
          required: true