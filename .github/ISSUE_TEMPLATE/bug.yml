name: 🐛 Bug
description: It's a bug

body:

  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!

        **Please provide as much information as you have available. The more information we have, the better we will be able to help resolve the issue.**

        ## Bug details

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: Provide a description of the bug.
      value: |
        <!-- A clear and concise description of the problem behavior, including what is happening, and what you expected to happen. -->
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist for new issues
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/civicband/.github/blob/main/CODE_OF_CONDUCT.md)
          required: true
        - label: I have searched the existing issues and believe this is not a duplicate
          required: true
